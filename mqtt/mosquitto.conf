# ============================================
# Eclipse Mosquitto MQTT Broker 配置
# 用于：夯土墙风蚀告警推送 + 前端MQTT订阅
# ============================================

per_listener_settings false

# ---------- 持久化 ----------
persistence true
persistence_location /mosquitto/data/
autosave_interval 300

# ---------- 日志 ----------
log_dest file /mosquitto/log/mosquitto.log
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
# 不记录普通连接/断开，减少日志量
connection_messages false
log_type error
log_type warning
log_type notice
log_type information
# log_type debug    # 调试时打开

# ---------- 安全 ----------
allow_anonymous false
password_file /mosquitto/config/pwfile
acl_file /mosquitto/config/aclfile

# ---------- 限制 ----------
max_connections 1000
max_inflight_bytes 0
max_queued_messages 10000
message_size_limit 0

# ---------- 心跳 ----------
# 默认60s，超时1.5×

# ============================================
# Listener 1: 原生MQTT (TCP, 1883) - 后端告警推送
# ============================================
listener 1883 0.0.0.0
protocol mqtt
socket_domain ipv4

# ============================================
# Listener 2: MQTT over WebSockets (9001) - 前端 Paho.js 订阅
# ============================================
listener 9001 0.0.0.0
protocol websockets
http_dir /mosquitto/www
socket_domain ipv4

# ---------- 桥接（可选，集群模式） ----------
# connection cluster-node-2
# address other-broker:1883
# topic wall/alert/# out 2
# bridge_protocol_version mqttv50
