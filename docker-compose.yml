version: "3.9"

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-restart-policy: &default-restart
  unless-stopped

x-health-defaults: &health-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

services:
  # ============================================
  # 1. TimescaleDB (PostgreSQL 16 + TimescaleDB 扩展)
  # ============================================
  timescaledb:
    image: timescale/timescaledb-ha:${TIMESCALEDB_VERSION:-latest-pg16}
    container_name: rew_timescaledb
    restart: *default-restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMePlease_2026!}
      POSTGRES_DB: ${POSTGRES_DB:-rammed_earth_wall}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data}
      TZ: ${TZ:-Asia/Shanghai}
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/01_init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql:ro
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rammed_earth_wall} -q"]
    logging: *default-logging
    networks:
      - backend

  # ============================================
  # 2. Redis 7.2 (消息总线 + 缓存)
  # ============================================
  redis:
    image: redis:${REDIS_VERSION:-7.2-alpine}
    container_name: rew_redis
    restart: *default-restart
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-RedisSecret_2026!}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --aof-use-rdb-preamble yes
      --save 900 1 --save 300 10 --save 60 10000
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *health-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisSecret_2026!}", "ping"]
    logging: *default-logging
    networks:
      - backend

  # ============================================
  # 3. MQTT Broker (Eclipse Mosquitto v2)
  # ============================================
  mqtt:
    image: eclipse-mosquitto:${MOSQUITTO_VERSION:-2.0}
    container_name: rew_mqtt
    restart: *default-restart
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    command: >
      sh -c "
        (cat /mosquitto/config/pwfile > /dev/null 2>&1 || \
          (mosquitto_passwd -c -b /mosquitto/config/pwfile \
            ${MQTT_USER:-wall_monitor} \
            ${MQTT_PASSWORD:-MQTT_Secret_2026!})) \
        && mosquitto -c /mosquitto/config/mosquitto.conf"
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u ${MQTT_USER:-wall_monitor} -P ${MQTT_PASSWORD:-MQTT_Secret_2026!} -t '\\$SYS/broker/uptime' -C 1 -W 3 > /dev/null || exit 1"]
    logging: *default-logging
    networks:
      - backend

  # ============================================
  # 4. FastAPI Backend (Gunicorn + Uvicorn workers)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rew_api
    restart: *default-restart
    depends_on:
      timescaledb:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: false
      mqtt:
        condition: service_healthy
        required: false
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:ChangeMePlease_2026!@timescaledb:5432/rammed_earth_wall}
      TIMESCALEDB_URL: ${TIMESCALEDB_URL:-postgresql://postgres:ChangeMePlease_2026!@timescaledb:5432/rammed_earth_wall}
      MQTT_BROKER: ${MQTT_BROKER:-mqtt}
      MQTT_PORT: ${MQTT_PORT_INTERNAL:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-wall/alert}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-backend_server}
      MQTT_USERNAME: ${MQTT_USERNAME:-wall_monitor}
      MQTT_PASSWORD: ${MQTT_PASSWORD_INTERNAL:-MQTT_Secret_2026!}
      REDIS_URL: ${REDIS_URL:-redis://:RedisSecret_2026!@redis:6379/0}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      WALL_SEGMENTS: "8"
      SIMULATION_INTERVAL: "3600"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - api_logs:/app/logs
    healthcheck:
      <<: *health-defaults
      start_period: 60s
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
    logging: *default-logging
    networks:
      - backend

  # ============================================
  # 5. Nginx - 前端静态资源 + Gzip压缩 + API反向代理
  # ============================================
  web:
    image: nginx:1.27-alpine
    container_name: rew_web
    restart: *default-restart
    depends_on:
      - api
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
    logging: *default-logging
    networks:
      - frontend
      - backend

  # ============================================
  # 6. 夯土墙传感器模拟器（4G DTU）
  # ============================================
  sensor_simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
      target: simulator
    container_name: rew_simulator
    restart: *default-restart
    depends_on:
      api:
        condition: service_healthy
        required: true
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SIM_API_URL: "http://api:8000"
      SIM_INTERVAL: "${SIMULATOR_INTERVAL:-300}"
      SIM_SEGMENTS: "${SIMULATOR_SEGMENTS:-8}"
      SIM_GENERATE_HISTORICAL: "${SIMULATOR_GENERATE_HISTORICAL:-true}"
      SIM_HISTORICAL_DAYS: "${SIMULATOR_HISTORICAL_DAYS:-30}"
      SIM_WIND_SPEED_MIN: "${SIM_WIND_SPEED_MIN:-3.0}"
      SIM_WIND_SPEED_MAX: "${SIM_WIND_SPEED_MAX:-14.0}"
      SIM_WIND_SPEED_BIAS: "${SIM_WIND_SPEED_BIAS:-0.0}"
      SIM_WIND_GUST_FREQ: "${SIM_WIND_GUST_FREQ:-0.25}"
      SIM_SEASONAL_FACTOR: "${SIM_SEASONAL_FACTOR:-1.3}"
      SIM_DIURNAL_ENABLE: "${SIM_DIURNAL_ENABLE:-true}"
      SIM_DOMINANT_WIND_DIR: "${SIM_DOMINANT_WIND_DIR:-225}"
      SIM_MOISTURE_BASE: "${SIM_MOISTURE_BASE:-5.5}"
      SIM_MOISTURE_BIAS: "${SIM_MOISTURE_BIAS:-0.0}"
      SIM_MOISTURE_VAR_MIN: "${SIM_MOISTURE_VAR_MIN:-0.5}"
      SIM_MOISTURE_VAR_MAX: "${SIM_MOISTURE_VAR_MAX:-1.5}"
    healthcheck:
      <<: *health-defaults
      start_period: 120s
      test: ["CMD-SHELL", "pgrep -f sensor_simulator.py > /dev/null || exit 1"]
    logging: *default-logging
    networks:
      - backend

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local
  mosquitto_config:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
  nginx_cache:
    driver: local
  api_logs:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
